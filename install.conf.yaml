- clean: ['~']
- link:
    ~/.zshrc:
      create: true
      force: true
      path: zshrc
    ~/.joker: joker.edn
    ~/.lein/profiles.clj:
      create: true
      path: profiles.clj
    ~/.boot/profile.boot:
      create: true
      path: profile.boot
    ~/.spacemacs: .spacemacs
- shell:
  - [git submodule update --init --recursive, Installing/updating submodules]
